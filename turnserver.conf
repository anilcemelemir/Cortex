# =============================================================
#  coturn (TURN) yapılandırması
# =============================================================
#  TURN, NAT/firewall yüzünden doğrudan P2P kurulamayan ağlarda
#  medyayı röleler. Çoğu ev ağında STUN yeter; TURN yalnızca fallback.
#
#  ÖNEMLİ: 'realm' ve 'user' şifresini KENDİ değerlerinle değiştir,
#  sonra client/renderer/config.js içindeki iceServers'a aynısını ekle.
# =============================================================

listening-port=3478
fingerprint
lt-cred-mech

# Kullanıcı: turnkullanici / Şifre: GÜÇLÜ-BİR-ŞİFRE-KOY
user=turnkullanici:GUCLU-BIR-SIFRE-KOY
realm=sesli.ornek-domain.com

# Relay için UDP port aralığı (VPS firewall'ında da açık olmalı)
min-port=49160
max-port=49200

# Log'u azalt
no-stdout-log
simple-log

# VPS'in public IP'sini buraya yaz (bazı sağlayıcılarda gerekir):
# external-ip=SENIN-VPS-IP
