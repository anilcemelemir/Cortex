name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || vars.AUTO_DEPLOY == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          APP_DIR="${VPS_APP_DIR:-/opt/cortex}"
          ssh "$VPS_USER@$VPS_HOST" "set -euo pipefail
            if [ ! -d '$APP_DIR/.git' ]; then
              sudo mkdir -p '$APP_DIR'
              sudo chown \$USER:\$USER '$APP_DIR'
              git clone 'https://github.com/$REPOSITORY.git' '$APP_DIR'
            fi
            cd '$APP_DIR'
            git fetch origin main
            git reset --hard origin/main
            if [ ! -f .env ]; then
              echo 'JWT_SECRET='\"\$(openssl rand -hex 32)\" > .env
            fi
            docker compose up -d --build
            docker image prune -f
          "
